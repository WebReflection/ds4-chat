<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS4 Chat</title>
    <link rel="stylesheet" href="index.css">
    <script type="module" src="index.js"></script>
</head>
<body>
  <header>
    <h1>DS4 Chat</h1>
    <label>
      <input type="range" min="0" max="1" step="0.05" value="0.0">
      Temp: 0.00
    </label>
    <label>
      <input type="checkbox">
      Thinking
    </label>
  </header>
  <main>
    <div class="messages hide-thinking"></div>
    <div class="input">
      <input type="text" placeholder="DS4 IP and port as URL">
      <input type="submit" value="Connect">
    </div>
  </main>
  <footer>© 2026 Andrea Giammarchi</footer>
</body>
</html>
